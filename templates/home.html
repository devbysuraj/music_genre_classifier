<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Genre Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.05);
        }

        input[type="file"] {
            display: block;
            width: 100%;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary-color);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-right: 1rem;
            transition: 0.3s;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .result-card {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: none;
            margin: 10px auto;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Genre AI</h1>
        <p class="subtitle">Upload an audio clip to identify the music genre</p>

        <form action="/predict" method="POST" enctype="multipart/form-data" id="uploadForm">
            <div class="upload-area">
                <input type="file" id="audio-upload" name="audio_file" accept="audio/*" required>
            </div>
            
            <button type="submit" id="submitBtn">Analyze Music</button>
            <div class="loader" id="loader"></div>
        </form>

        {% if predicted_genre %}
        <div class="result-card">
            <strong>Result:</strong>
            <p>{{ predicted_genre }}</p>
        </div>
        {% endif %}
    </div>

    <script>
        // Show loader when the form is submitted
        document.getElementById('uploadForm').onsubmit = function() {
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
        };
    </script>
</body>
</html>
